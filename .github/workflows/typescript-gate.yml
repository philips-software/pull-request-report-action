name: typescript-gate

on:
  merge_group:
    types: [checks_requested]
  pull_request:
    paths:
      - src/**
      - tests/**
      - '*.json'
      - action.yml
      - .github/workflows/typescript-gate.yml
  push:
    branches:
      - main
    paths:
      - src/**
      - tests/**
      - '*.json'
      - action.yml
      - .github/workflows/typescript-gate.yml

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v3.5.2
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: yarn
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - run: yarn
      - run: yarn build
      - run: yarn test
        env:
          GITHUB_TOKEN: ${{ github.token }} # GH cli call needs the token
      - run: yarn format-check
      - run: yarn lint
      - run: yarn package
